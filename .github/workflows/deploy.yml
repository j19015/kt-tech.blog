name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [notion-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=kt-tech-blog --commit-dirty=true --commit-message="deploy ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Purge CDN cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'
          sleep 5
        continue-on-error: true

      - name: Warm CDN cache
        run: |
          SITE="https://kt-tech.blog"
          for path in "/" "/blogs/page/1" "/about"; do
            curl -s -o /dev/null -w "WARM %{http_code} %{time_starttransfer}s $path\n" "${SITE}${path}" || true
          done
          SLUGS=$(curl -s -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"filter":{"property":"Status","select":{"equals":"Published"}},"page_size":100}' \
            | node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8');
              const j=JSON.parse(d);
              j.results.forEach(p=>{
                const slug=p.properties.Slug?.rich_text?.[0]?.plain_text || p.id.replace(/-/g,'');
                console.log(slug);
              });
            ")
          for slug in $SLUGS; do
            curl -s -o /dev/null -w "WARM %{http_code} %{time_starttransfer}s /blogs/${slug}\n" "${SITE}/blogs/${slug}" || true
            sleep 1
          done
        continue-on-error: true
