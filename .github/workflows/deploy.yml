name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.tsx', '**/*.ts', '**/*.css') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js & OpenNext
        run: npx opennextjs-cloudflare build
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.NOTION_API_KEY }}" | npx wrangler secret put NOTION_API_KEY
          echo "${{ secrets.NOTION_DATABASE_ID }}" | npx wrangler secret put NOTION_DATABASE_ID
          echo "${{ secrets.NEXT_PUBLIC_GA_ID }}" | npx wrangler secret put NEXT_PUBLIC_GA_ID
          echo "${{ secrets.SITE_URL }}" | npx wrangler secret put SITE_URL
